name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: ren_ts

# ─────────────────────────────────────────────
# Lint
# ─────────────────────────────────────────────
jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run ESLint
        run: bunx eslint --ext .ts,.tsx src

  # ─────────────────────────────────────────────
  # Unit tests
  # ─────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ren_ts/coverage/

  # ─────────────────────────────────────────────
  # Coverage report
  # ─────────────────────────────────────────────
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Generate coverage report
        run: bun run test --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ren_ts/coverage/

  # ─────────────────────────────────────────────
  # Tauri builds
  # ─────────────────────────────────────────────
  build-linux:
    name: Build — Linux
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ren_ts/src-tauri

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run tauri:build

      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            ren_ts/src-tauri/target/release/bundle/deb/*.deb
            ren_ts/src-tauri/target/release/bundle/appimage/*.AppImage

  build-macos:
    name: Build — macOS
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ren_ts/src-tauri

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run tauri:build

      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            ren_ts/src-tauri/target/release/bundle/dmg/*.dmg
            ren_ts/src-tauri/target/release/bundle/macos/*.app

  build-windows:
    name: Build — Windows
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ren_ts/src-tauri

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run tauri:build

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            ren_ts/src-tauri/target/release/bundle/msi/*.msi
            ren_ts/src-tauri/target/release/bundle/nsis/*.exe

  build-android:
    name: Build — Android
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk-headless

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ren_ts/src-tauri

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run tauri android build
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653

      - uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            ren_ts/src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  # ─────────────────────────────────────────────
  # Release — 仅在 push tag 时运行
  # ─────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
