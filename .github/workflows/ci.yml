name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────
# Lint
# ─────────────────────────────────────────────
jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run ESLint
        run: bunx eslint --ext .ts,.tsx src

  # ─────────────────────────────────────────────
  # Unit tests
  # ─────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: coverage/

  # ─────────────────────────────────────────────
  # Coverage report
  # ─────────────────────────────────────────────
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Generate coverage report
        run: bunx vitest run --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ─────────────────────────────────────────────
  # Tauri builds
  # ─────────────────────────────────────────────
  build-linux:
    name: Build — Linux
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run tauri:build

      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

  build-macos:
    name: Build — macOS
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run tauri:build

      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app

  build-windows:
    name: Build — Windows
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run tauri:build

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  build-android:
    name: Build — Android
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk-headless

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"

      - name: Install dependencies
        run: bun install

      - name: Init Android project
        run: bun run tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653

      # ── Android signing ───────────────────────────────────────────────────
      # Decode the base64-encoded keystore from secrets and write
      # keystore.properties so Gradle can locate it at build time.
      - name: Setup Android signing
        run: |
          cd src-tauri/gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}"       > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}"   >> keystore.properties
          echo "storeFile=$RUNNER_TEMP/keystore.jks"            >> keystore.properties
          base64 -d <<< "${{ secrets.ANDROID_KEY_BASE64 }}" > $RUNNER_TEMP/keystore.jks

      # Patch the generated build.gradle.kts to wire up the release signingConfig.
      # tauri android init creates the file but does not add signing by default.
      - name: Patch build.gradle.kts for release signing
        run: |
          GRADLE=src-tauri/gen/android/app/build.gradle.kts

          # 1. Add the Properties import after the first existing import line.
          sed -i 's/^import java\.io\.FileInputStream$/import java.io.FileInputStream\nimport java.util.Properties/' "$GRADLE"

          # 2. Inject the signingConfigs block immediately before the buildTypes block.
          python3 - "$GRADLE" <<'PYEOF'
          import sys, re

          path = sys.argv[1]
          src  = open(path).read()

          signing_block = '''
          signingConfigs {
              create("release") {
                  val keystorePropertiesFile = rootProject.file("keystore.properties")
                  val keystoreProperties = Properties()
                  if (keystorePropertiesFile.exists()) {
                      keystoreProperties.load(FileInputStream(keystorePropertiesFile))
                  }
                  keyAlias     = keystoreProperties["keyAlias"]  as String
                  keyPassword  = keystoreProperties["password"]  as String
                  storeFile    = file(keystoreProperties["storeFile"] as String)
                  storePassword = keystoreProperties["password"] as String
              }
          }
          '''

          # Insert signingConfigs block only if not already present.
          if 'signingConfigs' not in src:
              src = re.sub(r'(buildTypes\s*\{)', signing_block + r'\1', src, count=1)

          # Wire the release signingConfig inside the existing release buildType.
          if 'signingConfig = signingConfigs' not in src:
              src = re.sub(
                  r'(getByName\("release"\)\s*\{)',
                  r'\1\n            signingConfig = signingConfigs.getByName("release")',
                  src, count=1
              )

          open(path, 'w').write(src)
          print("build.gradle.kts patched successfully.")
          PYEOF

      - name: Build signed APK
        run: bun run tauri android build
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653

      - uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  # ─────────────────────────────────────────────
  # Release — 仅在 push tag 时运行
  # ─────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
